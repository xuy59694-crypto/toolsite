<main class="tool-page container"><div class="tool-page-header"><h1>🎨 CSS 渐变生成器</h1><p>可视化调整渐变色，实时预览，一键复制 CSS 代码。</p></div>
<div class="tool-workspace">
    <div id="gradientPreview" style="width:100%;height:200px;border-radius:var(--radius);margin-bottom:16px;background:linear-gradient(90deg,#4f46e5,#06b6d4);"></div>
    <div class="controls-row" style="margin-bottom:12px;">
        <select id="gradientType" onchange="updateGradient()" style="width:auto;"><option value="linear">线性渐变</option><option value="radial">径向渐变</option></select>
        <label>角度：<input type="range" id="gradientAngle" min="0" max="360" value="90" oninput="updateGradient()" style="width:120px;"></label>
        <span id="angleLabel" style="font-weight:700;">90°</span>
    </div>
    <div class="controls-row" style="margin-bottom:12px;align-items:center;">
        <input type="color" id="color1" value="#4f46e5" onchange="updateGradient()" style="width:60px;height:40px;">
        <span style="font-family:monospace;" id="color1Label">#4f46e5</span>
        <input type="color" id="color2" value="#06b6d4" onchange="updateGradient()" style="width:60px;height:40px;">
        <span style="font-family:monospace;" id="color2Label">#06b6d4</span>
        <button class="btn btn-secondary" onclick="randomColors()">🎲</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
        <label style="font-weight:600;">CSS 代码：</label>
        <code id="cssCode" style="flex:1;padding:10px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:0.9rem;white-space:pre-wrap;word-break:break-all;"></code>
        <button class="btn btn-primary" onclick="copyToClipboard(document.getElementById('cssCode').textContent)">📋</button>
    </div>
    <div class="ad-slot" style="margin-top:24px;">广告位</div>
</div></main>
<footer><p>&copy; 2025 在线工具箱 | <a href="/sitemap.xml">网站地图</a></p></footer>
<script src="../js/common.js"></script>
<script>
function updateGradient(){
    var type=document.getElementById("gradientType").value, angle=document.getElementById("gradientAngle").value;
    var c1=document.getElementById("color1").value, c2=document.getElementById("color2").value;
    document.getElementById("color1Label").textContent=c1; document.getElementById("color2Label").textContent=c2;
    document.getElementById("angleLabel").textContent=angle+"°";
    var preview=document.getElementById("gradientPreview"), css;
    if(type==="linear"){ css="linear-gradient("+angle+"deg, "+c1+", "+c2+")"; preview.style.background=css; }
    else{ css="radial-gradient(circle, "+c1+", "+c2+")"; preview.style.background=css; }
    document.getElementById("cssCode").textContent="background: "+css+";";
}
function randomColors(){
    var r=function(){ return Math.floor(Math.random()*256); };
    var h1="#"+[r(),r(),r()].map(function(x){ return x.toString(16).padStart(2,"0"); }).join("");
    var h2="#"+[r(),r(),r()].map(function(x){ return x.toString(16).padStart(2,"0"); }).join("");
    document.getElementById("color1").value=h1; document.getElementById("color2").value=h2; updateGradient();
}
updateGradient();
</script>
