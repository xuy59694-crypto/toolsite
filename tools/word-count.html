<main class="tool-page container">
    <div class="tool-page-header">
        <h1>📊 字数统计</h1>
        <p>输入文本，实时统计字数、字符数、段落数、行数 —— 写作和编辑必备。</p>
    </div>
    <div class="tool-workspace">
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <div style="flex:1;min-width:280px;">
        <textarea id="textInput" placeholder="粘贴或输入文本..." style="min-height:250px;" oninput="countWords()"></textarea>
    </div>
    <div style="flex:0 0 220px;">
        <div style="background:var(--bg-secondary);border-radius:var(--radius);padding:20px;">
            <h3 style="margin-bottom:16px;font-size:1rem;">统计结果</h3>
            <div style="margin-bottom:12px;"><span style="color:var(--text-secondary);">总字数：</span><span style="font-weight:700;font-size:1.3rem;" id="wordCount">0</span></div>
            <div style="margin-bottom:12px;"><span style="color:var(--text-secondary);">中文字符：</span><span style="font-weight:700;" id="chineseCount">0</span></div>
            <div style="margin-bottom:12px;"><span style="color:var(--text-secondary);">英文字词：</span><span style="font-weight:700;" id="englishCount">0</span></div>
            <div style="margin-bottom:12px;"><span style="color:var(--text-secondary);">总字符数：</span><span style="font-weight:700;" id="charCount">0</span></div>
            <div style="margin-bottom:12px;"><span style="color:var(--text-secondary);">段落数：</span><span style="font-weight:700;" id="paraCount">0</span></div>
            <div style="margin-bottom:12px;"><span style="color:var(--text-secondary);">行数：</span><span style="font-weight:700;" id="lineCount">0</span></div>
            <button class="btn btn-secondary" onclick="clearAll()" style="width:100%;">🗑️ 清空</button>
        </div>
    </div>
</div>
<script>
function countWords() {
    var t = document.getElementById("textInput").value;
    var chinese = (t.match(/[\u4e00-\u9fff]/g) || []).length;
    var englishWords = t.match(/[a-zA-Z]+/g);
    var eng = englishWords ? englishWords.length : 0;
    document.getElementById("wordCount").textContent = chinese + eng;
    document.getElementById("chineseCount").textContent = chinese;
    document.getElementById("englishCount").textContent = eng;
    document.getElementById("charCount").textContent = t.length;
    document.getElementById("paraCount").textContent = t.split("\n").filter(function(l){return l.trim();}).length;
    document.getElementById("lineCount").textContent = t.split("\n").length || (t ? 1 : 0);
}
function clearAll() { document.getElementById("textInput").value = ""; countWords(); }
</script>
