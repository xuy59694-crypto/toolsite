        <p>URL 编码和解码工具，处理网址中的中文和特殊字符。</p>
    </div>
    <div class="tool-workspace">
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <div style="flex:1;min-width:280px;">
        <textarea id="inputText" placeholder="输入要编码的文本或要解码的URL..." style="min-height:180px;font-family:monospace;"></textarea>
        <div class="controls-row">
            <button class="btn btn-primary" onclick="urlEncode()">🔒 URL编码</button>
            <button class="btn btn-primary" onclick="urlDecode()">🔓 URL解码</button>
            <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>
        </div>
    </div>
    <div style="flex:1;min-width:280px;">
        <div id="outputArea" class="result-area" style="background:var(--bg);border:1px solid var(--border);min-height:180px;">等待输入...</div>
    </div>
</div>
<script>
function urlEncode() {
    var t = document.getElementById("inputText").value;
    if (!t) { showToast("请输入内容"); return; }
    document.getElementById("outputArea").innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-all;">' + encodeURIComponent(t) + '</pre>';
}
function urlDecode() {
    var t = document.getElementById("inputText").value;
    if (!t) { showToast("请输入内容"); return; }
    try {
        document.getElementById("outputArea").innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-all;">' + decodeURIComponent(t) + '</pre>';
    } catch(e) {
        document.getElementById("outputArea").innerHTML = '<p style="color:#dc2626;">解码失败：无效的编码字符串</p>';
    }
}
function copyResult() { copyToClipboard(document.getElementById("outputArea").textContent); }
</script>
