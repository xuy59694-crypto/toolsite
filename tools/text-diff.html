<script>
function compareText() {
    var t1 = document.getElementById("text1").value;
    var t2 = document.getElementById("text2").value;
    if (!t1 && !t2) { showToast("璇疯緭鍏ユ枃鏈?); return; }
    
    var lines1 = t1.split("\n");
    var lines2 = t2.split("\n");
    var maxLen = Math.max(lines1.length, lines2.length);
    var html = '<table style="width:100%;border-collapse:collapse;font-family:monospace;font-size:0.85rem;">';
    
    for (var i = 0; i < maxLen; i++) {
        var l1 = lines1[i] || "";
        var l2 = lines2[i] || "";
        var bg1 = "", bg2 = "";
        var label1 = "", label2 = "";
        
        if (i >= lines1.length) { bg2 = "#dcfce7"; label2 = "+"; }
        else if (i >= lines2.length) { bg1 = "#fee2e2"; label1 = "-"; }
        else if (l1 !== l2) { bg1 = "#fee2e2"; bg2 = "#dcfce7"; label1 = "-"; label2 = "+"; }
        
        html += '<tr><td style="width:40px;text-align:right;padding:2px 8px;color:#94a3b8;border-right:1px solid #e2e8f0;background:#f8fafc;">' + (i+1) + '</td>' +
            '<td style="padding:2px 8px;background:' + (bg1 || "transparent") + ';min-width:40%;word-break:break-all;">' +
            (label1 ? '<span style="color:#dc2626;font-weight:bold;margin-right:4px;">' + label1 + '</span>' : '') + escapeHtml(l1) + '</td>' +
            '<td style="width:40px;text-align:right;padding:2px 8px;color:#94a3b8;border-right:1px solid #e2e8f0;background:#f8fafc;">' + (i+1) + '</td>' +
            '<td style="padding:2px 8px;background:' + (bg2 || "transparent") + ';min-width:40%;word-break:break-all;">' +
            (label2 ? '<span style="color:#16a34a;font-weight:bold;margin-right:4px;">' + label2 + '</span>' : '') + escapeHtml(l2) + '</td></tr>';
    }
    html += '</table>';
    document.getElementById("diffResult").innerHTML = html;
}

function clearText() {
    document.getElementById("text1").value = "";
    document.getElementById("text2").value = "";
    document.getElementById("diffResult").innerHTML = "";
}

function escapeHtml(str) { return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
