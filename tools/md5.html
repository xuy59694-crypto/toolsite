        <textarea id="textInput" placeholder="杈撳叆瑕佸姞瀵嗙殑鏂囨湰..." style="min-height:120px;font-family:monospace;"></textarea>
        <div class="controls-row">
            <button class="btn btn-primary" onclick="hash('MD5')">MD5</button>
            <button class="btn btn-primary" onclick="hash('SHA-1')">SHA-1</button>
            <button class="btn btn-primary" onclick="hash('SHA-256')">SHA-256</button>

<script>
async function hash(algo) {
    var t = document.getElementById("textInput").value;
    if (!t) { showToast("璇疯緭鍏ユ枃鏈?); return; }
    var encoder = new TextEncoder();
    var data = encoder.encode(t);
    var hashBuffer = await crypto.subtle.digest(algo, data);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    var hashHex = hashArray.map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
    document.getElementById("resultArea").innerHTML = '<p style="font-weight:600;margin-bottom:8px;">' + algo + ' 缁撴灉锛?/p><pre style="margin:0;white-space:pre-wrap;word-break:break-all;font-size:0.9rem;background:#fff;padding:12px;border-radius:6px;">' + hashHex + '</pre>';
}

async function hashFile() {
    var file = document.getElementById("fileInput").files[0];
    if (!file) return;
    var buffer = await file.arrayBuffer();
    var hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    var hashHex = hashArray.map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
    document.getElementById("resultArea").innerHTML = '<p style="font-weight:600;margin-bottom:8px;">鏂囦欢 SHA-256锛?/p><pre style="margin:0;white-space:pre-wrap;word-break:break-all;font-size:0.9rem;background:#fff;padding:12px;border-radius:6px;">' + hashHex + '</pre><p style="font-size:0.85rem;color:var(--text-secondary);margin-top:8px;">鏂囦欢鍚嶏細' + file.name + '</p>';
}
</script>
