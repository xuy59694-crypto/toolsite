<main class="tool-page container">
    <div class="tool-page-header">
        <h1>🔒 MD5 / SHA 加密</h1>
        <p>生成 MD5、SHA1、SHA256、SHA512 哈希值，支持文本和文件。</p>
    </div>
    <div class="tool-workspace">
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <div style="flex:1;min-width:280px;">
        <label style="font-weight:600;display:block;margin-bottom:6px;">输入文本</label>
        <textarea id="textInput" placeholder="输入要加密的文本..." style="min-height:120px;font-family:monospace;"></textarea>
        <div class="controls-row">
            <button class="btn btn-primary" onclick="hash('MD5')">MD5</button>
            <button class="btn btn-primary" onclick="hash('SHA-1')">SHA-1</button>
            <button class="btn btn-primary" onclick="hash('SHA-256')">SHA-256</button>
            <button class="btn btn-primary" onclick="hash('SHA-512')">SHA-512</button>
        </div>
        <div style="margin-top:16px;">
            <label style="font-weight:600;display:block;margin-bottom:6px;">或上传文件</label>
            <input type="file" id="fileInput" onchange="hashFile()">
        </div>
    </div>
    <div style="flex:1;min-width:280px;">
        <div id="resultArea" style="padding:16px;background:var(--bg-secondary);border-radius:var(--radius-sm);min-height:100px;">
            <p style="color:var(--text-secondary);">选择算法并输入文本后查看结果</p>
        </div>
    </div>
</div>
<script>
async function hash(algo) {
    var t = document.getElementById("textInput").value;
    if (!t) { showToast("请输入文本"); return; }
    var encoder = new TextEncoder();
    var data = encoder.encode(t);
    var hashBuffer = await crypto.subtle.digest(algo, data);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    var hashHex = hashArray.map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
    document.getElementById("resultArea").innerHTML = '<p style="font-weight:600;margin-bottom:8px;">' + algo + ' 结果：</p><pre style="margin:0;white-space:pre-wrap;word-break:break-all;font-size:0.9rem;background:#fff;padding:12px;border-radius:6px;">' + hashHex + '</pre>';
}

async function hashFile() {
    var file = document.getElementById("fileInput").files[0];
    if (!file) return;
    var buffer = await file.arrayBuffer();
    var hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    var hashHex = hashArray.map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
    document.getElementById("resultArea").innerHTML = '<p style="font-weight:600;margin-bottom:8px;">文件 SHA-256：</p><pre style="margin:0;white-space:pre-wrap;word-break:break-all;font-size:0.9rem;background:#fff;padding:12px;border-radius:6px;">' + hashHex + '</pre><p style="font-size:0.85rem;color:var(--text-secondary);margin-top:8px;">文件名：' + file.name + '</p>';
}
</script>
