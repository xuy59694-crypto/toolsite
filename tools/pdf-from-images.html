<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>在线图片转PDF - 免费将JPG/PNG图片转换为PDF</title><meta name="description" content="免费在线图片转PDF工具，支持JPG、PNG、WebP等格式图片转为PDF文件，可调整页面大小，浏览器本地处理。"><link rel="stylesheet" href="../css/style.css"><base href="/">
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
<header><div class="header-inner"><a href="/" class="logo"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>在线工具箱</a><nav class="header-nav"><a href="/">首页</a><a href="/tools/image-compress.html">图片工具</a><a href="/tools/qrcode.html">生成工具</a><a href="/tools/json-formatter.html">开发工具</a></nav></div></header>
<main class="tool-page container"><div class="tool-page-header"><h1>🖼️→📄 图片转 PDF</h1><p>将 JPG、PNG、WebP 等图片转换为 PDF 文件，可合并为单个 PDF。</p></div>
<div class="tool-workspace">
    <div id="dropZone" style="text-align:center;padding:40px;border:2px dashed var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:16px;">
        <div style="font-size:3rem;">📁</div><p style="font-weight:600;">点击选择图片</p><p style="color:var(--text-secondary);font-size:0.85rem;">支持 JPG/PNG/WebP，可多选</p>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
    </div>
    <div id="previewList" style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;"></div>
    <div class="controls-row" style="display:none;" id="optionsRow">
        <label style="font-weight:600;">页面尺寸：</label>
        <select id="pageSize" style="width:auto;"><option value="a4">A4</option><option value="letter">Letter</option><option value="fit">自适应</option></select>
        <label><input type="radio" name="mode" value="single" checked> 每图一页</label>
        <label><input type="radio" name="mode" value="merge"> 合并为一个PDF</label>
        <button class="btn btn-primary" onclick="convertToPDF()">📄 生成 PDF</button>
    </div>
    <div id="statusArea" style="text-align:center;margin-top:16px;font-weight:600;"></div>
    <div class="ad-slot" style="margin-top:24px;">广告位</div>
</div></main>
<footer><p>&copy; 2025 在线工具箱 | <a href="/sitemap.xml">网站地图</a></p></footer>
<script src="../js/common.js"></script>
<script>
var images=[], sizeMap={a4:[595,842],letter:[612,792]};
var dz=document.getElementById("dropZone"), fi=document.getElementById("fileInput");
dz.addEventListener("click",function(){ fi.click(); });
dz.addEventListener("dragover",function(e){ e.preventDefault(); dz.style.borderColor="var(--primary)"; });
dz.addEventListener("dragleave",function(){ dz.style.borderColor="var(--border)"; });
dz.addEventListener("drop",function(e){ e.preventDefault(); dz.style.borderColor="var(--border)"; addImages(e.dataTransfer.files); });
fi.addEventListener("change",function(){ addImages(fi.files); fi.value=""; });

function addImages(newFiles){
    for(var i=0;i<newFiles.length;i++){
        if(!newFiles[i].type.startsWith("image/")) continue;
        var reader=new FileReader();
        reader.onload=(function(name){ return function(e){ images.push({name:name,data:e.target.result}); renderPreview(); }; })(newFiles[i].name);
        reader.readAsDataURL(newFiles[i]);
    }
}
function renderPreview(){
    var h=""; for(var i=0;i<images.length;i++) h+='<img src="'+images[i].data+'" style="width:100px;height:100px;object-fit:cover;border-radius:8px;" title="'+images[i].name+'">';
    document.getElementById("previewList").innerHTML=h;
    document.getElementById("optionsRow").style.display=images.length?"flex":"none";
}

async function convertToPDF(){
    if(!images.length){ showToast("请选择图片"); return; }
    document.getElementById("statusArea").textContent="正在转换...";
    var mode=document.querySelector('input[name="mode"]:checked').value;
    var pdfDoc=await PDFLib.PDFDocument.create();
    for(var i=0;i<images.length;i++){
        var img;
        if(images[i].data.startsWith("data:image/png")) img=await pdfDoc.embedPng(images[i].data);
        else img=await pdfDoc.embedJpg(images[i].data);
        var imgDims=img.scale(1);
        var sizeName=document.getElementById("pageSize").value;
        if(sizeName==="fit"){ var page=pdfDoc.addPage([imgDims.width,imgDims.height]); }
        else{ var ss=sizeMap[sizeName]; var page=pdfDoc.addPage([ss[0],ss[1]]); }
        var scale=Math.min(page.getWidth()/imgDims.width,page.getHeight()/imgDims.height)*0.9;
        page.drawImage(img,{x:(page.getWidth()-imgDims.width*scale)/2,y:(page.getHeight()-imgDims.height*scale)/2,width:imgDims.width*scale,height:imgDims.height*scale});
    }
    var resultBytes=await pdfDoc.save();
    var blob=new Blob([resultBytes],{type:"application/pdf"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download="images.pdf"; a.click();
    URL.revokeObjectURL(url);
    document.getElementById("statusArea").textContent="✅ 转换完成！已开始下载";
}
</script>
</body></html>
