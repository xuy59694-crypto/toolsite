<main class="tool-page container">
    <div class="tool-page-header">
        <h1>🔄 图片格式转换</h1>
        <p>上传图片，选择目标格式即可转换，支持 PNG、JPEG、WebP、BMP 互转。</p>
    </div>
    <div class="tool-workspace">
        <div style="text-align:center;padding:30px 20px;border:2px dashed var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:16px;" onclick="document.getElementById(''fileInput''.replace(/''/g,'')).click()">
    <div style="font-size:3rem;margin-bottom:12px;">📁</div>
    <p style="font-weight:600;margin-bottom:4px;">点击选择图片</p>
    <p style="color:var(--text-secondary);font-size:0.85rem;">支持 PNG / JPEG / WebP / BMP</p>
    <input type="file" id="fileInput" accept="image/*" onchange="loadImage()" style="display:none;">
</div>
<div id="convertArea" style="display:none;">
    <div style="text-align:center;margin-bottom:16px;">
        <img id="previewImg" style="max-width:300px;max-height:200px;border-radius:8px;margin-bottom:12px;">
        <p style="font-size:0.9rem;color:var(--text-secondary);" id="fileInfo"></p>
    </div>
    <div class="controls-row">
        <label style="font-weight:600;">转换为：</label>
        <select id="formatSelect" style="width:auto;">
            <option value="image/png">PNG</option>
            <option value="image/jpeg">JPEG</option>
            <option value="image/webp">WebP</option>
            <option value="image/bmp">BMP</option>
        </select>
        <button class="btn btn-primary" onclick="convertImage()">🔄 转换</button>
        <button class="btn btn-secondary" onclick="downloadResult()" id="dlBtn" disabled>📥 下载</button>
    </div>
</div>
<script>
var origImg = null, resultData = null;
function loadImage() {
    var f = document.getElementById("fileInput").files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        origImg = e.target.result;
        document.getElementById("previewImg").src = origImg;
        document.getElementById("fileInfo").textContent = f.name + " (" + (f.size/1024).toFixed(1) + " KB)";
        document.getElementById("convertArea").style.display = "block";
    };
    reader.readAsDataURL(f);
}
function convertImage() {
    if (!origImg) return;
    var img = new Image();
    img.onload = function() {
        var canvas = document.createElement("canvas");
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext("2d").drawImage(img, 0, 0);
        var format = document.getElementById("formatSelect").value;
        canvas.toBlob(function(blob) {
            var reader = new FileReader();
            reader.onload = function(e) {
                resultData = e.target.result;
                document.getElementById("previewImg").src = resultData;
                document.getElementById("dlBtn").disabled = false;
                showToast("转换完成！");
            };
            reader.readAsDataURL(blob);
        }, format, 0.9);
    };
    img.src = origImg;
}
function downloadResult() {
    if (!resultData) return;
    var format = document.getElementById("formatSelect").value.split("/")[1];
    downloadFile(resultData, "converted." + format, "application/octet-stream");
}
</script>
