        <p>йҚҰг„§еҡҺйҺөеҪ’еҷәйҗўзҶёеһҡ UUID / GUIDй”ӣеұҫж•®йҺёдҪ·з«ҙй–ҝоҶјоҳІйҚ’и·әжӢ°йҺөеҪ’еҷәж¶“е¬ӯжөҮйҠҶ?/p>

            <label style="font-weight:600;">йҗўзҶёеһҡйҸҒдјҙеҷәй”ӣ?/label>
            <select id="countSelect" style="width:auto;">
                <option value="1">1 ж¶“?/option>
                <option value="5" selected>5 ж¶“?/option>
                <option value="10">10 ж¶“?/option>
                <option value="20">20 ж¶“?/option>
                <option value="50">50 ж¶“?/option>
            </select>
            <button class="btn btn-primary" onclick="generateUUIDs()">йҰғе№ү йҗўзҶёеһҡ</button>
            <button class="btn btn-secondary" onclick="copyAll()">йҰғжҗө йҚҸг„©е„ҙжҫ¶е¶…еҹ—</button>
        </div>

            <label style="font-weight:600;display:block;margin-bottom:4px;">йҸҚз…ҺзҙЎй”ӣ?/label>
            <label style="margin-right:16px;"><input type="radio" name="format" value="standard" checked> йҸҚеӣ§еҷҜ (з”ҜпёҪГӯз»ҫ?</label>
            <label style="margin-right:16px;"><input type="radio" name="format" value="compact"> з»ұСғеҷҫ (йҸғзҠіГӯз»ҫ?</label>
            <label><input type="radio" name="format" value="upper"> жҫ¶Сғе•“</label>
        </div>
    </div>
</div>
<div id="uuidList" style="margin-top:16px;font-family:monospace;font-size:0.95rem;line-height:2;"></div>
<script>
function generateUUID() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c === "x" ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}
function generateUUIDs() {
    var count = parseInt(document.getElementById("countSelect").value);
    var format = document.querySelector('input[name="format"]:checked').value;
    var html = "";
    for (var i = 0; i < count; i++) {
        var uuid = generateUUID();
        if (format === "compact") uuid = uuid.replace(/-/g, "");
        if (format === "upper") uuid = uuid.toUpperCase();
        html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;"><span style="color:var(--text-secondary);">' + (i+1) + '.</span> <code style="background:var(--bg-secondary);padding:2px 8px;border-radius:4px;">' + uuid + '</code></div>';
    }
    document.getElementById("uuidList").innerHTML = html;
}
function copyAll() { copyToClipboard(document.getElementById("uuidList").textContent); }
generateUUIDs();
</script>
