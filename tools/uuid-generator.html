<main class="tool-page container">
    <div class="tool-page-header">
        <h1>🆔 UUID 生成器</h1>
        <p>在线批量生成 UUID / GUID，支持一键复制和批量下载。</p>
    </div>
    <div class="tool-workspace">
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <div style="flex:1;min-width:280px;">
        <div class="controls-row">
            <label style="font-weight:600;">生成数量：</label>
            <select id="countSelect" style="width:auto;">
                <option value="1">1 个</option>
                <option value="5" selected>5 个</option>
                <option value="10">10 个</option>
                <option value="20">20 个</option>
                <option value="50">50 个</option>
            </select>
            <button class="btn btn-primary" onclick="generateUUIDs()">🎲 生成</button>
            <button class="btn btn-secondary" onclick="copyAll()">📋 全部复制</button>
        </div>
        <div style="margin-top:8px;">
            <label style="font-weight:600;display:block;margin-bottom:4px;">格式：</label>
            <label style="margin-right:16px;"><input type="radio" name="format" value="standard" checked> 标准 (带横线)</label>
            <label style="margin-right:16px;"><input type="radio" name="format" value="compact"> 紧凑 (无横线)</label>
            <label><input type="radio" name="format" value="upper"> 大写</label>
        </div>
    </div>
</div>
<div id="uuidList" style="margin-top:16px;font-family:monospace;font-size:0.95rem;line-height:2;"></div>
<script>
function generateUUID() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c === "x" ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}
function generateUUIDs() {
    var count = parseInt(document.getElementById("countSelect").value);
    var format = document.querySelector('input[name="format"]:checked').value;
    var html = "";
    for (var i = 0; i < count; i++) {
        var uuid = generateUUID();
        if (format === "compact") uuid = uuid.replace(/-/g, "");
        if (format === "upper") uuid = uuid.toUpperCase();
        html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;"><span style="color:var(--text-secondary);">' + (i+1) + '.</span> <code style="background:var(--bg-secondary);padding:2px 8px;border-radius:4px;">' + uuid + '</code></div>';
    }
    document.getElementById("uuidList").innerHTML = html;
}
function copyAll() { copyToClipboard(document.getElementById("uuidList").textContent); }
generateUUIDs();
</script>
