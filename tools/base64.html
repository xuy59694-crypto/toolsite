<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64在线编解码 - 文本/图片Base64编码解码工具</title>
    <meta name="description" content="免费在线Base64编码解码工具，支持文本和图片的Base64编解码，支持UTF-8等多种字符集，浏览器本地处理。">
    <link rel="stylesheet" href="../css/style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head>
<body>
<header>
    <div class="header-inner">
        <a href="/" class="logo">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            在线工具箱
        </a>
        <nav class="header-nav">
            <a href="../index.html">首页</a>
            <a href="../tools/image-compress.html">图片工具</a>
            <a href="../tools/qrcode.html">生成工具</a>
            <a href="../tools/json-formatter.html">开发工具</a>
        </nav>
    </div>
</header>

<main class="tool-page container">
    <div class="tool-page-header">
        <h1>🔐 Base64 编解码</h1>
        <p>Base64 编码和解码工具，支持文本与图片互转，所有处理在浏览器本地完成。</p>
    </div>

    <div class="tool-workspace">
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <div style="flex:1;min-width:280px;">
                <label style="font-weight:600;display:block;margin-bottom:6px;">输入内容</label>
                <textarea id="inputText" placeholder="输入要编码的文本，或要解码的Base64字符串..." style="min-height:180px;font-family:monospace;"></textarea>
                <div class="controls-row">
                    <button class="btn btn-primary" onclick="encode()">🔒 Base64 编码</button>
                    <button class="btn btn-primary" onclick="decode()">🔓 Base64 解码</button>
                    <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>
                    <button class="btn btn-secondary" onclick="clearFields()">🗑️ 清空</button>
                </div>
                <div style="margin-top:12px;">
                    <input type="file" id="imageFile" accept="image/*" onchange="imageToBase64()" style="font-size:0.85rem;">
                    <p style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;">也可上传图片转Base64</p>
                </div>
            </div>
            <div style="flex:1;min-width:280px;">
                <label style="font-weight:600;display:block;margin-bottom:6px;">输出结果</label>
                <div id="outputArea" class="result-area" style="background:var(--bg);border:1px solid var(--border);min-height:180px;">等待输入...</div>
            </div>
        </div>
        <div class="ad-slot" style="margin-top:24px;">广告位 - Google AdSense</div>
    </div>
</main>

<footer><p>&copy; 2025 在线工具箱 | <a href="/sitemap.xml">网站地图</a></p></footer>
<script src="../js/common.js"></script>
<script>
function encode() {
    var text = document.getElementById("inputText").value;
    if (!text) { showToast("请输入内容"); return; }
    try {
        var encoded = btoa(unescape(encodeURIComponent(text)));
        document.getElementById("outputArea").innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-all;">' + encoded + '</pre>';
    } catch(e) {
        document.getElementById("outputArea").innerHTML = '<p style="color:#dc2626;">编码失败：' + e.message + '</p>';
    }
}

function decode() {
    var text = document.getElementById("inputText").value.trim();
    if (!text) { showToast("请输入内容"); return; }
    try {
        var decoded = decodeURIComponent(escape(atob(text)));
        document.getElementById("outputArea").innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-all;">' + escapeHtml(decoded) + '</pre>';
    } catch(e) {
        document.getElementById("outputArea").innerHTML = '<p style="color:#dc2626;">解码失败：请检查是否为有效的Base64字符串</p>';
    }
}

function imageToBase64() {
    var file = document.getElementById("imageFile").files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("inputText").value = e.target.result;
        document.getElementById("outputArea").innerHTML = '<img src="' + e.target.result + '" style="max-width:100%;max-height:300px;border-radius:8px;">';
    };
    reader.readAsDataURL(file);
}

function copyResult() { copyToClipboard(document.getElementById("outputArea").textContent); }
function clearFields() { document.getElementById("inputText").value = ""; document.getElementById("outputArea").innerHTML = "等待输入..."; document.getElementById("imageFile").value = ""; }
function escapeHtml(str) { return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
