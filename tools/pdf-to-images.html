<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>在线PDF转图片 - 免费将PDF页面导出为JPG/PNG图片</title><meta name="description" content="免费在线PDF转图片工具，将PDF每一页导出为高质量JPG或PNG图片，浏览器本地处理，安全便捷。"><link rel="stylesheet" href="../css/style.css"><base href="/">
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
</head>
<body>
<header><div class="header-inner"><a href="/" class="logo"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>在线工具箱</a><nav class="header-nav"><a href="/">首页</a><a href="/tools/image-compress.html">图片</a><a href="/tools/pdf-merge.html">PDF</a><a href="/tools/qrcode.html">生成</a><a href="/tools/json-formatter.html">开发</a><a href="/tools/unit-converter.html">换算</a><a href="/tools/word-count.html">文本</a></nav></div></header>
<main class="tool-page container"><div class="tool-page-header"><h1>📄→🖼️ PDF 转图片</h1><p>将 PDF 每一页导出为图片，支持 JPG / PNG 格式。</p></div>
<div class="tool-workspace">
    <div id="uploadArea" style="text-align:center;padding:40px;border:2px dashed var(--border);border-radius:var(--radius);cursor:pointer;" onclick="document.getElementById('fileInput').click()">
        <div style="font-size:3rem;margin-bottom:12px;">📁</div>
        <p style="font-weight:600;">点击选择 PDF 文件</p>
        <input type="file" id="fileInput" accept=".pdf,application/pdf" style="display:none;">
    </div>
    <div id="actionArea" style="display:none;">
        <div class="controls-row">
            <label style="font-weight:600;">导出格式：</label>
            <select id="outputFormat" style="width:auto;"><option value="jpg">JPG</option><option value="png">PNG</option></select>
            <label style="font-weight:600;">质量：</label>
            <input type="range" id="quality" min="50" max="100" value="90" style="width:120px;">
            <span id="qLabel">90%</span>
            <button class="btn btn-primary" onclick="renderPages()">🖼️ 开始渲染</button>
        </div>
        <p style="color:var(--text-secondary);margin:8px 0;" id="pageInfo"></p>
        <div id="pagesPreview" style="display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;"></div>
        <div class="controls-row" style="margin-top:12px;display:none;" id="dlRow">
            <button class="btn btn-primary" onclick="downloadAll()">📥 下载全部</button>
        </div>
    </div>
    <div id="statusArea" style="text-align:center;margin-top:16px;font-weight:600;"></div>
    <div class="ad-slot" style="margin-top:24px;">广告位 - 支持本站</div>
</div></main>
<footer><div style="max-width:1200px;margin:0 auto;padding:0 24px;"><p style="text-align:center;color:var(--text-secondary);font-size:0.8rem;">&copy; 2025 在线工具箱 - 所有工具均在浏览器本地运行，不上传文件 | <a href="/sitemap.xml">网站地图</a></p><p style="text-align:center;color:var(--text-secondary);font-size:0.75rem;margin-top:4px;">ICP备案号：待备案 | 如有侵权请联系删除</p></div></footer>
<script src="../js/common.js"></script>
<script>
var pdfDoc=null,totalPages=0,renderedCanvases=[];
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js";

document.getElementById("quality").addEventListener("input",function(){ document.getElementById("qLabel").textContent=this.value+"%"; });
document.getElementById("fileInput").addEventListener("change",async function(){
    var file=this.files[0]; if(!file) return;
    document.getElementById("statusArea").textContent="正在加载PDF...";
    var arrayBuffer=await file.arrayBuffer();
    pdfDoc=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    totalPages=pdfDoc.numPages;
    document.getElementById("pageInfo").textContent="共 "+totalPages+" 页";
    document.getElementById("uploadArea").style.display="none";
    document.getElementById("actionArea").style.display="block";
    document.getElementById("statusArea").textContent="";
});

async function renderPages(){
    if(!pdfDoc){ showToast("请先选择PDF"); return; }
    document.getElementById("statusArea").textContent="正在渲染...";
    renderedCanvases=[];
    document.getElementById("pagesPreview").innerHTML="";
    var format=document.getElementById("outputFormat").value;
    var quality=parseInt(document.getElementById("quality").value)/100;
    for(var i=1;i<=totalPages;i++){
        var page=await pdfDoc.getPage(i);
        var viewport=page.getViewport({scale:2});
        var canvas=document.createElement("canvas");
        canvas.width=viewport.width; canvas.height=viewport.height;
        var ctx=canvas.getContext("2d");
        await page.render({canvasContext:ctx,viewport:viewport}).promise;
        renderedCanvases.push(canvas);
        var thumb=document.createElement("div");
        thumb.style.cssText="text-align:center;";
        var previewCanvas=document.createElement("canvas");
        var scale=Math.min(180/viewport.width,180/viewport.height);
        previewCanvas.width=viewport.width*scale; previewCanvas.height=viewport.height*scale;
        previewCanvas.getContext("2d").drawImage(canvas,0,0,previewCanvas.width,previewCanvas.height);
        thumb.appendChild(previewCanvas);
        thumb.innerHTML+='<p style="font-size:0.8rem;margin-top:4px;">第 '+i+' 页</p>';
        document.getElementById("pagesPreview").appendChild(thumb);
    }
    document.getElementById("dlRow").style.display="flex";
    document.getElementById("statusArea").textContent="✅ 渲染完成！共 "+totalPages+" 页";
}

function downloadAll(){
    if(!renderedCanvases.length) return;
    var format=document.getElementById("outputFormat").value;
    for(var i=0;i<renderedCanvases.length;i++){
        var link=document.createElement("a");
        link.download="page_"+(i+1)+"."+format;
        link.href=renderedCanvases[i].toDataURL("image/"+format,0.95);
        setTimeout(function(l){ l.click(); },i*200,link);
    }
}
</script>
</body></html>
