<script src="../js/common.js"></script>
<script>
var images = [];
var dropZone = document.getElementById("dropZone");
var fileInput = document.getElementById("fileInput");
var previewArea = document.getElementById("previewArea");
var qualityRange = document.getElementById("qualityRange");
var qualityLabel = document.getElementById("qualityLabel");
var imageList = document.getElementById("imageList");

dropZone.addEventListener("click", function() { fileInput.click(); });
dropZone.addEventListener("dragover", function(e) { e.preventDefault(); dropZone.style.borderColor = "var(--primary)"; });
dropZone.addEventListener("dragleave", function() { dropZone.style.borderColor = "var(--border)"; });
dropZone.addEventListener("drop", function(e) { e.preventDefault(); dropZone.style.borderColor = "var(--border)"; handleFiles(e.dataTransfer.files); });
fileInput.addEventListener("change", function() { handleFiles(fileInput.files); });
qualityRange.addEventListener("input", function() { qualityLabel.textContent = qualityRange.value + "%"; });

function handleFiles(files) {
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        if (!f.type.match(/image\/(png|jpeg|webp)/)) continue;
        var reader = new FileReader();
        reader.onload = (function(file) {
            return function(e) {
                images.push({ name: file.name, original: e.target.result, size: file.size, compressed: null, compSize: 0 });
                renderImages();
            };
        })(f);
        reader.readAsDataURL(f);
    }
    if (images.length > 0) { previewArea.style.display = "block"; dropZone.style.padding = "20px"; }
}

function renderImages() {
    imageList.innerHTML = "";
    for (var i = 0; i < images.length; i++) {
        var img = images[i];
        var div = document.createElement("div");
        div.style.cssText = "display:flex;align-items:center;gap:16px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);";
        div.innerHTML = '<img src="' + img.original + '" style="width:80px;height:80px;object-fit:cover;border-radius:6px;">' +
            '<div style="flex:1;min-width:0;"><p style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + img.name + '</p>' +
            '<p style="font-size:0.85rem;color:var(--text-secondary);">鍘熷: ' + formatSize(img.size) + (img.compSize ? ' 鈫?鍘嬬缉鍚? ' + formatSize(img.compSize) + ' (鑺傜渷 ' + Math.round((1 - img.compSize/img.size)*100) + '%)' : '') + '</p></div>' +
            '<button class="btn btn-primary" style="white-space:nowrap;font-size:0.85rem;" onclick="compressOne(' + i + ')">鍘嬬缉</button>' +
            '<button class="btn btn-secondary" style="white-space:nowrap;font-size:0.85rem;" onclick="downloadOne(' + i + ')" ' + (img.compressed ? '' : 'disabled') + '>涓嬭浇</button>';
        imageList.appendChild(div);
    }
}

function compressOne(idx) {
    var img = images[idx];
    var canvas = document.createElement("canvas");
    var ctx = canvas.getContext("2d");
    var image = new Image();
    image.onload = function() {
        canvas.width = image.width;
        canvas.height = image.height;
        ctx.drawImage(image, 0, 0);
        var format = document.getElementById("formatSelect").value;
        var mime = format === "auto" ? "image/" + img.name.split(".").pop().replace("jpg","jpeg") : format;
        canvas.toBlob(function(blob) {
            var reader = new FileReader();
            reader.onload = function(e) {
                img.compressed = e.target.result;
                img.compSize = blob.size;
                renderImages();
            };
            reader.readAsDataURL(blob);
        }, mime, qualityRange.value / 100);
    };
    image.src = img.original;
}

function compressAll() {
    for (var i = 0; i < images.length; i++) compressOne(i);
}

function downloadOne(idx) {
    var img = images[idx];
    if (!img.compressed) return;
    var ext = img.name.split(".").pop();
    downloadFile(img.compressed, img.name.replace("."+ext, "_compressed."+ext), "application/octet-stream");
}

function downloadAll() {
    for (var i = 0; i < images.length; i++) {
        if (images[i].compressed) setTimeout(function(j){ return function(){ downloadOne(j); }; }(i), i * 300);
    }
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1048576).toFixed(2) + " MB";
}
</script>
