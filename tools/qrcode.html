<script>
var qrInstance = null;

function updatePlaceholder() {
    var type = document.getElementById("qrType").value;
    var placeholders = { url: "杈撳叆缃戝潃锛屼緥濡傦細https://example.com", text: "杈撳叆浠绘剰鏂囨湰鍐呭", wifi: "WIFI:T:WPA;S:缃戠粶鍚嶇О;P:瀵嗙爜;;", tel: "杈撳叆鐢佃瘽鍙风爜锛屼緥濡傦細13800138000", email: "杈撳叆閭欢鍦板潃锛屼緥濡傦細hello@example.com" };
    document.getElementById("qrContent").placeholder = placeholders[type] || "";
}
updatePlaceholder();

function generateQR() {
    var content = document.getElementById("qrContent").value.trim();
    if (!content) { showToast("璇疯緭鍏ュ唴瀹?); return; }
    
    var type = document.getElementById("qrType").value;
    if (type === "wifi") { content = content.startsWith("WIFI:") ? content : "WIFI:T:WPA;S:缃戠粶鍚嶇О;P:" + content + ";;"; }
    if (type === "tel") { content = "tel:" + content; }
    if (type === "email") { content = "mailto:" + content; }

    var container = document.getElementById("qrContainer");
    container.innerHTML = "";
    
    var size = parseInt(document.getElementById("qrSize").value);
    var fg = document.getElementById("fgColor").value;
    var bg = document.getElementById("bgColor").value;

    qrInstance = new QRCode(container, {
        text: content, width: size, height: size,
        colorDark: fg, colorLight: bg,
        correctLevel: QRCode.CorrectLevel.M
    });

    document.getElementById("btnDlPNG").disabled = false;
    document.getElementById("btnDlSVG").disabled = false;
}

function downloadQR(format) {
    var canvas = document.querySelector("#qrContainer canvas");
    if (!canvas) { showToast("璇峰厛鐢熸垚浜岀淮鐮?); return; }
    if (format === "png") {
        var link = document.createElement("a");
        link.download = "qrcode.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    } else {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + canvas.width + '" height="' + canvas.height + '">' +
            '<image href="' + canvas.toDataURL("image/png") + '" width="' + canvas.width + '" height="' + canvas.height + '"/></svg>';
        var blob = new Blob([svg], {type:"image/svg+xml"});
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.download = "qrcode.svg";
        link.href = url;
        link.click();
    }
}
</script>
