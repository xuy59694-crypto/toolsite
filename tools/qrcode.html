<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线二维码生成器 - 免费生成URL、文本、WiFi二维码，可自定义颜色</title>
    <meta name="description" content="免费在线二维码生成器，支持生成网址、文本、WiFi密码、电话号码、邮件等二维码。可自定义前景色和背景色，支持PNG/SVG下载。">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head>
<body>
<header>
    <div class="header-inner">
        <a href="/" class="logo">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            在线工具箱
        </a>
        <nav class="header-nav">
            <a href="../index.html">首页</a>
            <a href="../tools/image-compress.html">图片工具</a>
            <a href="../tools/qrcode.html">生成工具</a>
            <a href="../tools/json-formatter.html">开发工具</a>
        </nav>
    </div>
</header>

<main class="tool-page container">
    <div class="tool-page-header">
        <h1>📱 在线二维码生成器</h1>
        <p>输入内容即可生成二维码，支持 URL、文本、WiFi 密码等，可自定义颜色和大小。</p>
    </div>

    <div class="tool-workspace">
        <div style="display:flex;gap:24px;flex-wrap:wrap;">
            <div style="flex:1;min-width:280px;">
                <div style="margin-bottom:16px;">
                    <label style="font-weight:600;display:block;margin-bottom:6px;">内容类型</label>
                    <select id="qrType" onchange="updatePlaceholder()" style="width:100%;">
                        <option value="url">网址 URL</option>
                        <option value="text">文本内容</option>
                        <option value="wifi">WiFi 密码</option>
                        <option value="tel">电话号码</option>
                        <option value="email">邮件地址</option>
                    </select>
                </div>
                <div style="margin-bottom:16px;">
                    <textarea id="qrContent" placeholder="输入网址，例如：https://example.com" style="min-height:100px;"></textarea>
                </div>
                <div class="controls-row">
                    <div style="flex:1;">
                        <label style="font-weight:600;display:block;margin-bottom:4px;font-size:0.85rem;">前景色</label>
                        <input type="color" id="fgColor" value="#000000" style="width:100%;height:40px;padding:4px;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-weight:600;display:block;margin-bottom:4px;font-size:0.85rem;">背景色</label>
                        <input type="color" id="bgColor" value="#FFFFFF" style="width:100%;height:40px;padding:4px;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-weight:600;display:block;margin-bottom:4px;font-size:0.85rem;">尺寸</label>
                        <select id="qrSize" style="width:100%;"><option value="200">小 (200)</option><option value="300" selected>中 (300)</option><option value="400">大 (400)</option><option value="500">超大 (500)</option></select>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="generateQR()" style="width:100%;justify-content:center;">生成二维码</button>
            </div>
            <div style="flex:0 0 auto;text-align:center;min-width:250px;">
                <div id="qrContainer" style="display:flex;align-items:center;justify-content:center;min-height:250px;padding:16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;">
                    <p style="color:var(--text-secondary);">输入内容后点击生成</p>
                </div>
                <div style="margin-top:12px;display:flex;gap:8px;justify-content:center;">
                    <button class="btn btn-primary" onclick="downloadQR('png')" style="font-size:0.85rem;" id="btnDlPNG" disabled>下载 PNG</button>
                    <button class="btn btn-secondary" onclick="downloadQR('svg')" style="font-size:0.85rem;" id="btnDlSVG" disabled>下载 SVG</button>
                </div>
            </div>
        </div>
        <div class="ad-slot" style="margin-top:24px;">广告位 - Google AdSense</div>
    </div>
</main>

<footer><p>&copy; 2025 在线工具箱 | <a href="/sitemap.xml">网站地图</a></p></footer>
<script src="../js/common.js"></script>
<script>
var qrInstance = null;

function updatePlaceholder() {
    var type = document.getElementById("qrType").value;
    var placeholders = { url: "输入网址，例如：https://example.com", text: "输入任意文本内容", wifi: "WIFI:T:WPA;S:网络名称;P:密码;;", tel: "输入电话号码，例如：13800138000", email: "输入邮件地址，例如：hello@example.com" };
    document.getElementById("qrContent").placeholder = placeholders[type] || "";
}
updatePlaceholder();

function generateQR() {
    var content = document.getElementById("qrContent").value.trim();
    if (!content) { showToast("请输入内容"); return; }
    
    var type = document.getElementById("qrType").value;
    if (type === "wifi") { content = content.startsWith("WIFI:") ? content : "WIFI:T:WPA;S:网络名称;P:" + content + ";;"; }
    if (type === "tel") { content = "tel:" + content; }
    if (type === "email") { content = "mailto:" + content; }

    var container = document.getElementById("qrContainer");
    container.innerHTML = "";
    
    var size = parseInt(document.getElementById("qrSize").value);
    var fg = document.getElementById("fgColor").value;
    var bg = document.getElementById("bgColor").value;

    qrInstance = new QRCode(container, {
        text: content, width: size, height: size,
        colorDark: fg, colorLight: bg,
        correctLevel: QRCode.CorrectLevel.M
    });

    document.getElementById("btnDlPNG").disabled = false;
    document.getElementById("btnDlSVG").disabled = false;
}

function downloadQR(format) {
    var canvas = document.querySelector("#qrContainer canvas");
    if (!canvas) { showToast("请先生成二维码"); return; }
    if (format === "png") {
        var link = document.createElement("a");
        link.download = "qrcode.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    } else {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + canvas.width + '" height="' + canvas.height + '">' +
            '<image href="' + canvas.toDataURL("image/png") + '" width="' + canvas.width + '" height="' + canvas.height + '"/></svg>';
        var blob = new Blob([svg], {type:"image/svg+xml"});
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.download = "qrcode.svg";
        link.href = url;
        link.click();
    }
}
</script>
</body>
</html>
