<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>在线录音转文字 - 免费语音转文字、录音转写工具</title><meta name="description" content="免费在线录音转文字工具，支持实时语音识别转文字，支持中文/英文等多种语言，浏览器本地处理，无需上传。"><link rel="stylesheet" href="../css/style.css"><base href="/"></head>
<body>
<header><div class="header-inner"><a href="/" class="logo"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>在线工具箱</a><nav class="header-nav"><a href="/">首页</a><a href="/tools/image-compress.html">图片</a><a href="/tools/pdf-merge.html">PDF</a><a href="/tools/qrcode.html">生成</a><a href="/tools/json-formatter.html">开发</a><a href="/tools/unit-converter.html">换算</a><a href="/tools/word-count.html">文本</a></nav></div></header>
<main class="tool-page container"><div class="tool-page-header"><h1>🎙️ 录音转文字</h1><p>实时语音识别，说话自动转文字，支持中文和英文。使用浏览器内置语音引擎，不上传任何数据。</p></div>
<div class="tool-workspace">
    <div class="controls-row" style="margin-bottom:16px;">
        <select id="langSelect" style="width:auto;">
            <option value="zh-CN">中文（普通话）</option>
            <option value="en-US">English (US)</option>
            <option value="zh-HK">中文（粤语）</option>
            <option value="ja-JP">日本語</option>
            <option value="ko-KR">한국어</option>
        </select>
        <button class="btn btn-primary" id="startBtn" onclick="startRecording()">🎙️ 开始录音</button>
        <button class="btn btn-secondary" id="stopBtn" onclick="stopRecording()" disabled>⏹ 停止</button>
        <button class="btn btn-secondary" id="clearBtn" onclick="clearText()">🗑️ 清空</button>
    </div>
    <div style="text-align:center;padding:24px;border-radius:var(--radius);margin-bottom:16px;" id="statusArea">
        <div style="font-size:4rem;margin-bottom:12px;" id="statusIcon">🎤</div>
        <p style="font-weight:600;color:var(--text-secondary);" id="statusText">点击"开始录音"按钮开始</p>
        <p style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;" id="browserNote"></p>
    </div>
    <div class="result-area" id="transcriptArea" style="min-height:200px;background:var(--bg);border:1px solid var(--border);line-height:1.8;font-size:1rem;">
        <span style="color:var(--text-secondary);">转录文字将在这里显示...</span>
    </div>
    <div class="controls-row" style="margin-top:12px;">
        <button class="btn btn-primary" onclick="copyTranscript()">📋 复制全文</button>
        <button class="btn btn-secondary" onclick="downloadTranscript()">📥 下载 TXT</button>
        <span style="color:var(--text-secondary);font-size:0.8rem;">字数：<strong id="wordCounter">0</strong></span>
    </div>
    <div class="ad-slot" style="margin-top:24px;">广告位 - 支持本站</div>
</div></main>
<footer><div style="max-width:1200px;margin:0 auto;padding:0 24px;"><p style="text-align:center;color:var(--text-secondary);font-size:0.8rem;">&copy; 2025 在线工具箱 - 所有工具浏览器本地运行 | <a href="/sitemap.xml">网站地图</a></p><p style="text-align:center;color:var(--text-secondary);font-size:0.75rem;margin-top:4px;">ICP备案号：待备案 | 如有侵权请联系删除</p></div></footer>
<script src="../js/common.js"></script>
<script>
var recognition=null, isRecording=false, finalText="", interimText="";
var startBtn=document.getElementById("startBtn"), stopBtn=document.getElementById("stopBtn");
var statusIcon=document.getElementById("statusIcon"), statusText=document.getElementById("statusText");
var transcriptArea=document.getElementById("transcriptArea"), wordCounter=document.getElementById("wordCounter");
var browserNote=document.getElementById("browserNote");

// Check browser support
if(!("webkitSpeechRecognition" in window)&&!("SpeechRecognition" in window)){
    statusText.textContent="您的浏览器不支持语音识别";
    browserNote.textContent="请使用 Chrome 或 Edge 浏览器打开此工具";
    startBtn.disabled=true;
}else{
    browserNote.textContent="支持 Chrome / Edge 浏览器 · 需要麦克风权限";
}

function startRecording(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();
    recognition.lang=document.getElementById("langSelect").value;
    recognition.continuous=true;
    recognition.interimResults=true;
    recognition.maxAlternatives=1;

    recognition.onstart=function(){
        isRecording=true; startBtn.disabled=true; stopBtn.disabled=false;
        statusIcon.textContent="🔴"; statusText.textContent="正在录音中...请说话";
        document.getElementById("langSelect").disabled=true;
        if(transcriptArea.innerHTML.includes("转录文字将在这里显示")) transcriptArea.innerHTML="";
    };

    recognition.onresult=function(event){
        interimText="";
        for(var i=event.resultIndex;i<event.results.length;i++){
            if(event.results[i].isFinal){
                finalText+=event.results[i][0].transcript+"。\n";
            }else{
                interimText+=event.results[i][0].transcript;
            }
        }
        transcriptArea.innerHTML='<p style="white-space:pre-wrap;">'+escapeHtml(finalText)+'<span style="color:var(--primary);">'+escapeHtml(interimText)+'</span></p>';
        transcriptArea.scrollTop=transcriptArea.scrollHeight;
        wordCounter.textContent=finalText.length;
    };

    recognition.onerror=function(event){
        if(event.error==="no-speech"){ statusText.textContent="未检测到语音，请检查麦克风"; }
        else if(event.error!=="aborted"){ statusText.textContent="识别错误："+event.error; }
    };

    recognition.onend=function(){
        if(isRecording){
            try{ recognition.start(); }catch(e){ stopState(); }
        }else{ stopState(); }
    };

    recognition.start();
    statusIcon.textContent="🔴";
}

function stopRecording(){
    isRecording=false;
    if(recognition){ try{ recognition.stop(); }catch(e){} }
    stopState();
}

function stopState(){
    startBtn.disabled=false; stopBtn.disabled=true;
    document.getElementById("langSelect").disabled=false;
    statusIcon.textContent="🎤"; statusText.textContent="已停止录音";
    if(finalText) transcriptArea.innerHTML='<p style="white-space:pre-wrap;">'+escapeHtml(finalText)+'</p>';
}

function clearText(){
    finalText=""; interimText="";
    transcriptArea.innerHTML='<span style="color:var(--text-secondary);">转录文字将在这里显示...</span>';
    wordCounter.textContent="0";
}

function copyTranscript(){ if(finalText) copyToClipboard(finalText); else showToast("暂无内容可复制"); }
function downloadTranscript(){
    if(!finalText){ showToast("暂无内容"); return; }
    downloadFile(finalText,"transcript.txt","text/plain;charset=utf-8");
}

function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body></html>
