<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>在线HTML实体编解码 - HTML Entity编码解码工具</title><meta name="description" content="免费在线HTML实体编码解码工具，支持HTML特殊字符转义和反转义，防止XSS攻击，开发者必备。"><link rel="stylesheet" href="../css/style.css"><base href="/"></head>
<body>
<header><div class="header-inner"><a href="/" class="logo"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>在线工具箱</a><nav class="header-nav"><a href="/">首页</a><a href="/tools/image-compress.html">图片工具</a><a href="/tools/qrcode.html">生成工具</a><a href="/tools/json-formatter.html">开发工具</a></nav></div></header>
<main class="tool-page container"><div class="tool-page-header"><h1>🔤 HTML 实体编解码</h1><p>HTML 实体编码和解码，处理 &lt;、&gt;、&amp; 等特殊字符。</p></div>
<div class="tool-workspace">
    <div class="controls-row" style="margin-bottom:12px;">
        <button class="btn btn-primary" onclick="entityEncode()">🔒 编码</button>
        <button class="btn btn-primary" onclick="entityDecode()">🔓 解码</button>
        <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>
        <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <div style="flex:1;min-width:280px;">
            <textarea id="sourceText" placeholder="输入要编码的文本，或要解码的HTML实体..." style="min-height:200px;font-family:monospace;">&lt;div class="example"&gt;Hello &amp; World!&lt;/div&gt;</textarea>
        </div>
        <div style="flex:1;min-width:280px;">
            <div id="resultText" class="result-area" style="background:var(--bg);border:1px solid var(--border);min-height:200px;">点击编码或解码查看结果</div>
        </div>
    </div>
    <div class="ad-slot" style="margin-top:24px;">广告位</div>
</div></main>
<footer><p>&copy; 2025 在线工具箱 | <a href="/sitemap.xml">网站地图</a></p></footer>
<script src="../js/common.js"></script>
<script>
var entityMap={ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" };
function entityEncode(){
    var str=document.getElementById("sourceText").value;
    var encoded=str.replace(/[&<>"']/g,function(m){ return entityMap[m]; });
    document.getElementById("resultText").innerHTML='<pre style="margin:0;white-space:pre-wrap;">'+encoded.replace(/&/g,"&amp;").replace(/</g,"&lt;")+'</pre>';
}
function entityDecode(){
    var str=document.getElementById("sourceText").value;
    var txt=document.createElement("textarea");
    txt.innerHTML=str;
    document.getElementById("resultText").innerHTML='<pre style="margin:0;white-space:pre-wrap;">'+txt.value.replace(/&/g,"&amp;").replace(/</g,"&lt;")+'</pre>';
}
function copyResult(){ copyToClipboard(document.getElementById("resultText").textContent); }
function clearAll(){ document.getElementById("sourceText").value=""; document.getElementById("resultText").innerHTML=""; }
</script>
</body></html>
