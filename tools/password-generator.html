<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线密码生成器 - 随机强密码生成工具</title>
    <meta name="description" content="免费在线密码生成器，生成随机强密码，支持自定义长度、大小写字母、数字和特殊字符，一键复制。">
    <link rel="stylesheet" href="../css/style.css">
    <base href="/">
</head>
<body>
<header><div class="header-inner"><a href="/" class="logo"><svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>在线工具箱</a><nav class="header-nav"><a href="/">首页</a><a href="/tools/image-compress.html">图片</a><a href="/tools/pdf-merge.html">PDF</a><a href="/tools/qrcode.html">生成</a><a href="/tools/json-formatter.html">开发</a><a href="/tools/unit-converter.html">换算</a><a href="/tools/word-count.html">文本</a></nav></div></header>
<main class="tool-page container">
    <div class="tool-page-header"><h1>🔑 密码生成器</h1><p>一键生成高强度随机密码，支持自定义长度和字符组合。</p></div>
    <div class="tool-workspace">
        <div class="controls-row" style="margin-bottom:16px;">
            <label style="font-weight:600;">密码长度：</label>
            <input type="range" id="pwdLen" min="6" max="64" value="16" oninput="document.getElementById('lenLabel').textContent=this.value;generatePwd()" style="flex:1;max-width:250px;">
            <span id="lenLabel" style="font-weight:700;width:30px;">16</span>
        </div>
        <div class="controls-row" style="margin-bottom:16px;">
            <label><input type="checkbox" id="useUpper" checked onchange="generatePwd()"> 大写字母</label>
            <label><input type="checkbox" id="useLower" checked onchange="generatePwd()"> 小写字母</label>
            <label><input type="checkbox" id="useDigits" checked onchange="generatePwd()"> 数字</label>
            <label><input type="checkbox" id="useSymbols" onchange="generatePwd()"> 特殊字符</label>
        </div>
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;">
            <input type="text" id="pwdResult" readonly style="font-family:monospace;font-size:1.2rem;text-align:center;font-weight:700;letter-spacing:2px;">
            <button class="btn btn-primary" onclick="copyPwd()">📋 复制</button>
            <button class="btn btn-secondary" onclick="generatePwd()">🎲 重新生成</button>
        </div>
        <p style="color:var(--text-secondary);font-size:0.85rem;" id="strengthLabel"></p>
        <div class="ad-slot" style="margin-top:24px;">广告位 - 支持本站</div>
    </div>
</main>
<footer><div style="max-width:1200px;margin:0 auto;padding:0 24px;"><p style="text-align:center;color:var(--text-secondary);font-size:0.8rem;">&copy; 2025 在线工具箱 - 所有工具均在浏览器本地运行，不上传文件 | <a href="/sitemap.xml">网站地图</a></p><p style="text-align:center;color:var(--text-secondary);font-size:0.75rem;margin-top:4px;">ICP备案号：待备案 | 如有侵权请联系删除</p></div></footer>
<script src="../js/common.js"></script>
<script>
var upper="ABCDEFGHIJKLMNOPQRSTUVWXYZ", lower="abcdefghijklmnopqrstuvwxyz", digits="0123456789", symbols="!@#$%^&*()_+-=[]{}|;:,.<>?";
function generatePwd(){
    var len=parseInt(document.getElementById("pwdLen").value), chars="";
    if(document.getElementById("useUpper").checked) chars+=upper;
    if(document.getElementById("useLower").checked) chars+=lower;
    if(document.getElementById("useDigits").checked) chars+=digits;
    if(document.getElementById("useSymbols").checked) chars+=symbols;
    if(!chars){ document.getElementById("pwdResult").value="请选择字符类型"; return; }
    var crypto=window.crypto||window.msCrypto, arr=new Uint32Array(len);
    crypto.getRandomValues(arr);
    var pwd=""; for(var i=0;i<len;i++) pwd+=chars[arr[i]%chars.length];
    document.getElementById("pwdResult").value=pwd;
    var score=0; if(len>=12) score++; if(len>=16) score++; if(document.getElementById("useUpper").checked) score++;
    if(document.getElementById("useLower").checked) score++; if(document.getElementById("useDigits").checked) score++;
    if(document.getElementById("useSymbols").checked) score++;
    var labels=["弱","一般","中等","强","非常强","超强"], colors=["#dc2626","#f59e0b","#eab308","#84cc16","#22c55e","#059669"];
    document.getElementById("strengthLabel").innerHTML='强度：<span style="font-weight:700;color:'+colors[score]+'">'+labels[score]+'</span>';
}
function copyPwd(){ copyToClipboard(document.getElementById("pwdResult").value); }
generatePwd();
</script>
</body>
</html>
