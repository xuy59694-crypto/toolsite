<main class="tool-page container">
    <div class="tool-page-header">
        <h1>🎨 颜色选择器</h1>
        <p>在线取色、调色、色值转换、渐变色生成 —— 设计师和前端开发必备。</p>
    </div>

    <div class="tool-workspace">
        <div style="display:flex;gap:24px;flex-wrap:wrap;">
            <div style="flex:1;min-width:280px;">
                <div style="margin-bottom:16px;">
                    <label style="font-weight:600;display:block;margin-bottom:6px;">选择颜色</label>
                    <input type="color" id="colorPicker" value="#4f46e5" onchange="updateColor()" style="width:100%;height:80px;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;">
                </div>
                <div style="margin-bottom:16px;">
                    <label style="font-weight:600;display:block;margin-bottom:6px;">HEX 色值</label>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="hexInput" value="#4f46e5" onchange="fromHex()" style="font-family:monospace;">
                        <button class="btn btn-secondary" onclick="copyToClipboard(document.getElementById('hexInput')">📋</button>
                    </div>
                </div>
                <div style="display:flex;gap:16px;margin-bottom:16px;">
                    <div style="flex:1;"><label style="font-weight:600;display:block;margin-bottom:4px;">R</label><input type="number" id="rInput" value="79" min="0" max="255" onchange="fromRGB()"></div>
                    <div style="flex:1;"><label style="font-weight:600;display:block;margin-bottom:4px;">G</label><input type="number" id="gInput" value="70" min="0" max="255" onchange="fromRGB()"></div>
                    <div style="flex:1;"><label style="font-weight:600;display:block;margin-bottom:4px;">B</label><input type="number" id="bInput" value="229" min="0" max="255" onchange="fromRGB()"></div>
                </div>
                <div style="margin-bottom:16px;" id="hslDisplay">
                    <p style="font-weight:600;margin-bottom:4px;">HSL</p>
                    <p style="font-family:monospace;color:var(--text-secondary);" id="hslValue">hsl(239, 84%, 59%)</p>
                </div>
                <button class="btn btn-primary" onclick="randomColor()" style="width:100%;">🎲 随机颜色</button>
            </div>
            <div style="flex:1;min-width:280px;">
                <div id="colorPreview" style="width:100%;height:200px;border-radius:var(--radius);background:#4f46e5;margin-bottom:16px;transition:background 0.3s;"></div>
                <p style="font-weight:600;margin-bottom:8px;">配色方案（互补色）</p>
                <div style="display:flex;gap:8px;" id="palette"></div>

<script src="../js/common.js"></script>
<script>
function updateColor() {
    var hex = document.getElementById("colorPicker").value;
    document.getElementById("hexInput").value = hex;
    document.getElementById("colorPreview").style.background = hex;
    updateRGBFromHex(hex);
    generatePalette(hex);
}

function updateRGBFromHex(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    document.getElementById("rInput").value = r;
    document.getElementById("gInput").value = g;
    document.getElementById("bInput").value = b;
    updateHSL(r, g, b);
}

function updateHSL(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    var max = Math.max(r,g,b), min = Math.min(r,g,b);
    var h, s, l = (max + min) / 2;
    if (max === min) { h = s = 0; }
    else {
        var d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch(max) {
            case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
            case g: h = ((b - r) / d + 2) / 6; break;
            case b: h = ((r - g) / d + 4) / 6; break;
        }
    }
    document.getElementById("hslValue").textContent = "hsl(" + Math.round(h*360) + ", " + Math.round(s*100) + "%, " + Math.round(l*100) + "%)";
}

function fromHex() {
    var hex = document.getElementById("hexInput").value;
    if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
        document.getElementById("colorPicker").value = hex;
        document.getElementById("colorPreview").style.background = hex;
        updateRGBFromHex(hex);
        generatePalette(hex);
    }
}

function fromRGB() {
    var r = parseInt(document.getElementById("rInput").value) || 0;
    var g = parseInt(document.getElementById("gInput").value) || 0;
    var b = parseInt(document.getElementById("bInput").value) || 0;
    var hex = "#" + [r,g,b].map(function(x){ return ("0"+Math.min(255,Math.max(0,x)).toString(16)).slice(-2); }).join("");
    document.getElementById("hexInput").value = hex;
    document.getElementById("colorPicker").value = hex;
    document.getElementById("colorPreview").style.background = hex;
    updateHSL(r, g, b);
    generatePalette(hex);
}

function randomColor() {
    var hex = "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
    document.getElementById("colorPicker").value = hex;
    document.getElementById("hexInput").value = hex;
    document.getElementById("colorPreview").style.background = hex;
    updateRGBFromHex(hex);
    generatePalette(hex);
}

function generatePalette(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    
    // Generate complementary colors
    var colors = [hex];
    for (var i = 30; i <= 180; i += 30) {
        var hr = (r + i) % 255;
        var hg = (g + i) % 255;
        var hb = (b + i) % 255;
        var h = "#" + [hr,hg,hb].map(function(x){ return ("0"+x.toString(16)).slice(-2); }).join("");
        colors.push(h);
    }
    
    var paletteHtml = "";
    for (var j = 0; j < 6; j++) {
        paletteHtml += '<div style="width:40px;height:40px;border-radius:6px;background:' + colors[j] + ';cursor:pointer;" onclick="selectColor(\'' + colors[j] + '\')" title="' + colors[j] + '"></div>';
    }
    document.getElementById("palette").innerHTML = paletteHtml;
}

function selectColor(hex) {
    document.getElementById("colorPicker").value = hex;
    updateColor();
}

// Initialize
updateColor();
</script>
</body>
</html>
