<main class="tool-page container">

    <div class="tool-workspace">
        <div style="display:flex;gap:24px;flex-wrap:wrap;">
            <div style="flex:1;min-width:280px;">
                <textarea id="jsonInput" placeholder='粘贴 JSON 数据，例如：{"name":"张三","age":25}' style="min-height:220px;font-family:monospace;font-size:0.9rem;"></textarea>
                <div class="controls-row">
                    <button class="btn btn-primary" onclick="formatJSON()">✨ 格式化</button>
                    <button class="btn btn-secondary" onclick="compressJSON()">🗜️ 压缩</button>
                    <button class="btn btn-secondary" onclick="validateJSON()">✅ 验证</button>
                    <button class="btn btn-secondary" onclick="copyResult()">📋 复制结果</button>

                </div>
            </div>

<script src="../js/common.js"></script>
<script>
function formatJSON() {
    try {
        var obj = JSON.parse(document.getElementById("jsonInput").value);
        var formatted = JSON.stringify(obj, null, 2);
        document.getElementById("jsonOutput").innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-all;color:#059669;">' + escapeHtml(formatted) + '</pre>';
    } catch(e) {
        document.getElementById("jsonOutput").innerHTML = '<p style="color:#dc2626;">❌ JSON 格式错误：' + e.message + '</p>';
    }
}

function compressJSON() {
    try {
        var obj = JSON.parse(document.getElementById("jsonInput").value);
        var compressed = JSON.stringify(obj);
        document.getElementById("jsonOutput").innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-all;">' + escapeHtml(compressed) + '</pre>';
    } catch(e) {
        document.getElementById("jsonOutput").innerHTML = '<p style="color:#dc2626;">❌ JSON 格式错误：' + e.message + '</p>';
    }
}

function validateJSON() {
    try {
        var obj = JSON.parse(document.getElementById("jsonInput").value);
        document.getElementById("jsonOutput").innerHTML = '<p style="color:#059669;">✅ JSON 格式正确！共 ' + Object.keys(obj).length + ' 个顶层键</p>';
    } catch(e) {
        document.getElementById("jsonOutput").innerHTML = '<p style="color:#dc2626;">❌ ' + e.message + '</p>';
    }
}

function copyResult() { copyToClipboard(document.getElementById("jsonOutput").textContent); }
function clearAll() { document.getElementById("jsonInput").value = ""; document.getElementById("jsonOutput").innerHTML = "等待输入..."; }
function escapeHtml(str) { return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
